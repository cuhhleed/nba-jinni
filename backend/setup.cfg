[flake8]
max-line-length = 88
extend-ignore =
    # E203: whitespace before ':' (conflicts with black)
    E203,
    # W503: line break before binary operator (conflicts with black)
    W503,
    # ANN101: missing type annotation for self
    ANN101,
    # ANN102: missing type annotation for cls
    ANN102
exclude =
    .venv,
    __pycache__,
    .git
