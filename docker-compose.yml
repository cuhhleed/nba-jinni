services:
  db:
    image: postgres:15
    container_name: nbajinni-dev-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEV_DB}
    ports:
      - "5432:5432"
    volumes:
      - dev_data:/var/lib/postgresql/data

volumes:
  dev_data:
    external: true
    name: 7fdd18cd47e0241887677d0965fdf1120c3f20b5a650152428614175a2e99364
